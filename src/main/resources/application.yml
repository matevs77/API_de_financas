server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financas_dev}
    username: ${SPRING_DATASOURCE_USERNAME:financas_user}
    password: ${SPRING_DATASOURCE_PASSWORD:financas_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    cache-names: balanceReport,cashFlow,categorySummary
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:minha-chave-secreta-muito-longa-minimo-256-bits-dev}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

management:
  server:
    add-application-context-path: false
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when_authorized
    info:
      env:
        enabled: false

logging:
  level:
    com.financas.api: INFO
    org.hibernate.SQL: WARN

